<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Selectors</title>
    <style>
        p{
            color: red;
        }
        #fifth{
            color: blue;
        }
        .class-grip{
            color: green;
        }
    </style>
</head>
<body>
    <p>First item</p>
    <p>Second item</p>
    <p class="class-grip">Third item</p>
    <p class="class-grip">Fourth item</p>
    <p id="fifth">Fifth item</p>
</body>
</html>
