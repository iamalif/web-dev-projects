<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <h1>DOM Events</h1>
    <button onclick="makeOrange()">Make Orange</button>
    <button id="make-yellow">Make Yellow</button>
    <br>
    <input id="user-email" type="email">
    <script>
        // option 1
        function makeOrange(){
            document.body.style.backgroundColor = 'orange';
        }
        // option 2
        document.getElementById('make-yellow').addEventListener('click', function(){
            document.body.style.backgroundColor = 'yellow';
        })

        // keyup event
        document.getElementById('user-email').addEventListener('keyup', function(event){
            console.log(event.target.value);
        })
    </script>
</body>
</html>
